version: "3.9"

# ────────────────────────────────────────────────────────────────────────────
# Polymarket ETH 15m Research Stack — LOCAL MODE
#
# PURPOSE: Run continuously on your laptop for 5–7 days to collect paper
#          trading data for the v1 vs v2 experiment.
#
# IMPORTANT — LOCAL ENVIRONMENT CONSTRAINTS:
#   • This stack runs on your machine, NOT in the cloud.
#   • Data collection stops the moment Docker stops or the laptop sleeps.
#   • Keep your laptop POWERED ON and Docker RUNNING during the experiment.
#   • Disable Sleep / Auto-hibernate in macOS System Settings → Battery.
#   • The SQLite database is stored in a named volume so it survives
#     'docker compose restart' and normal container crashes.
#
# START:   make up      or  docker compose up -d
# STOP:    make down    or  docker compose down
# LOGS:    make logs    or  docker compose logs -f
# STATUS:  make status  or  docker compose ps
# ────────────────────────────────────────────────────────────────────────────

x-worker-base: &worker-base
  build:
    context: .
    dockerfile: Dockerfile
  volumes:
    - .:/app                        # live code mount (no rebuild needed for code changes)
    - db_data:/app/data             # persistent SQLite storage
    - ./results:/app/results        # research output files (manifests, daily, summaries)
  env_file:
    - .env
  environment:
    # Override the default relative DB path so SQLite writes to the named volume
    DATABASE_URL: "sqlite+pysqlite:////app/data/polymarket_bot.db"
  restart: unless-stopped           # auto-restart on crash; stop only with 'make down'
  depends_on:
    - api

services:

  # ── API ──────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
      - db_data:/app/data
      - ./results:/app/results
    env_file:
      - .env
    environment:
      DATABASE_URL: "sqlite+pysqlite:////app/data/polymarket_bot.db"
    command: uvicorn apps.api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  # ── SCANNER (market + snapshot ingestion) ────────────────────────────────
  scanner:
    <<: *worker-base
    command: python -m apps.worker.scanner
    depends_on:
      api:
        condition: service_healthy

  # ── SIGNAL ENGINE ────────────────────────────────────────────────────────
  signal_engine:
    <<: *worker-base
    command: python -m apps.worker.signal_engine
    depends_on:
      api:
        condition: service_healthy

  # ── PAPER TRADER ─────────────────────────────────────────────────────────
  paper_trader:
    <<: *worker-base
    command: python -m apps.worker.paper_trader
    depends_on:
      api:
        condition: service_healthy

  # ── SETTLEMENT ENGINE ────────────────────────────────────────────────────
  settlement_engine:
    <<: *worker-base
    command: python -m apps.worker.settlement_engine
    depends_on:
      api:
        condition: service_healthy

volumes:
  # Named volume — persists the SQLite database across restarts.
  # 'docker compose down' does NOT delete this volume.
  # 'docker compose down -v' WILL delete it (do not do this during the experiment).
  db_data:
